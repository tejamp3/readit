version: '3.8'

services:
  frontend:
    build:
      context: M:\\readit-frontend\\frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: M:\\SPRING-BOOT-PROJECTS\\readit-backend
    ports:
      - "8081:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/readit_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Redtaylor12.

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: Redtaylor12.
      MYSQL_DATABASE: readit_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: